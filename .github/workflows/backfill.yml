name: Backfill date range

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        type: string
      notify:
        description: "Send Telegram notification at the end?"
        required: false
        type: boolean
        default: false
      force:
        description: "Re-summarize even if data already exists (use after prompt changes)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  SITE_BASE_URL: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 \
            libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      - name: Backfill range
        run: |
          start="${{ inputs.start_date }}"
          end="${{ inputs.end_date }}"
          force_flag=""
          if [ "${{ inputs.force }}" = "true" ]; then
            force_flag="--force"
          fi
          current="$start"
          while [ "$current" != "$(date -d "$end + 1 day" +%Y-%m-%d)" ]; do
            echo "::group::Processing $current"
            uv run python -m scripts.scrape --date "$current" || true
            uv run python -m scripts.summarize --date "$current" $force_flag || true
            echo "::endgroup::"
            current=$(date -d "$current + 1 day" +%Y-%m-%d)
          done

      - name: Build PDFs
        run: uv run python -m scripts.build

      - name: Notify Telegram (optional)
        if: inputs.notify
        run: uv run python -m scripts.notify
        continue-on-error: true

      - name: Commit
        run: |
          git config user.name "lokicieroperu-bot"
          git config user.email "noreply@github.com"
          git add data pdfs
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "backfill: ${{ inputs.start_date }} → ${{ inputs.end_date }} [skip ci]"
            git push
          fi
