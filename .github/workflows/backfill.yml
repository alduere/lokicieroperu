name: Backfill date range

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        type: string
      notify:
        description: "Send Telegram + email notification at the end?"
        required: false
        type: boolean
        default: false
      force:
        description: "Re-summarize even if data already exists (use after prompt changes)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  SITE_BASE_URL: https://alduere.github.io/notirelevanteperu

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2 \
            libgdk-pixbuf-2.0-0 fonts-liberation

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Backfill range
        run: |
          start="${{ inputs.start_date }}"
          end="${{ inputs.end_date }}"
          force_flag=""
          if [ "${{ inputs.force }}" = "true" ]; then
            force_flag="--force"
          fi
          current="$start"
          while [ "$current" != "$(date -d "$end + 1 day" +%Y-%m-%d)" ]; do
            echo "::group::Processing $current"
            uv run python -m scripts.scrape --date "$current" || true
            uv run python -m scripts.summarize --date "$current" $force_flag || true
            echo "::endgroup::"
            current=$(date -d "$current + 1 day" +%Y-%m-%d)
          done

      - name: Build PDFs and Astro site
        run: uv run python -m scripts.build

      - name: Notify Telegram (optional)
        if: inputs.notify
        run: uv run python -m scripts.notify
        continue-on-error: true

      - name: Notify Email (optional)
        if: inputs.notify && env.BREVO_API_KEY != ''
        run: uv run python -m scripts.notify_email
        continue-on-error: true

      - name: Commit
        run: |
          git config user.name "notirelevanteperu-bot"
          git config user.email "noreply@github.com"
          git add data pdfs
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "backfill: ${{ inputs.start_date }} → ${{ inputs.end_date }} [skip ci]"
            git push
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: backfill
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
